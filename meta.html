<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Sets the character encoding - makes sure special characters display correctly -->
  <meta charset="UTF-8">

  <!-- Makes the page responsive on mobile screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Shows on Google search results below your page title - keep it under 160 characters -->
  <meta name="description" content="A website to practice HTML topics like forms, tables, lists and more">

  <!-- Keywords related to your page - helps search engines understand your content -->
  <meta name="keywords" content="HTML, practice, forms, tables, lists, semantic">

  <!-- Your name as the author of the page -->
  <meta name="author" content="Pragati Dixit">

  <!-- Small icon shown on the browser tab -->
  <link rel="icon" type="image/png" href="https://www.google.com/favicon.ico">

  <!-- How your page appears when shared on WhatsApp, Facebook etc -->
  <meta property="og:title" content="My Learning Hub">
  <meta property="og:description" content="A website to practice HTML">
  <meta property="og:image" content="https://via.placeholder.com/300">

  <!-- Connects your CSS file for styling -->
  <link rel="stylesheet" href="style.css">

  <!-- Page title shown on browser tab -->
  <title>Meta Tags Practice</title>

  <!-- Connects your JavaScript file - kept at bottom of head or before closing body tag -->
  <script src="script.js"></script>

</head>
<body>
  <h1>Check the browser tab for the favicon!</h1>
  <p>All the important stuff for this topic is in the head tag above.</p>
</body>
</html>
